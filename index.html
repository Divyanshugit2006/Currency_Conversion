<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1 style="text-align: center;">Curreny Converter</h1>

    <form>
        <div class="amount">
            <p>Enter amount to be converted</p>
            <input value=1 type="text">
        </div>


        <div class="dropdown">
            <div class="from">
                <p>From</p>
                <div class="select">
                    <img src="https://flagsapi.com/US/flat/64.png">
                    <select name="from">
                        <!-- <option value="USD">USD</option>
                        <option value="INR">INR</option>
                        <option value="AUD">AUD</option> -->
                    </select>
                </div>
            </div>
            <img src="https://cdn-icons-png.flaticon.com/512/436/436368.png" alt="">
            <div class="to">
                <p>From</p>
                <div class="select">
                    <img src="https://flagsapi.com/IN/flat/64.png">
                    <select name="to">
                        <!-- <option value="INR">INR</option>
                        <option value="USD">USD</option>
                        <option value="AUD">AUD</option> -->
                    </select>
                </div>
            </div>
        </div>
        <div class="msg">
            <p></p>
        </div>
        <div class="btn">

            <button>Get equivalent amount</button>
        </div>
    </form>
    <script src="codes.js"></script>
    <script src="str.js"></script>
</body>

</html>
